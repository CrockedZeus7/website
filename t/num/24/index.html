<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시간표</title>
  <style>
    body {
      font-family: 'GmarketSansMedium', sans-serif;
      background-color: #1a1a1a;
      color: white;
      text-align: center;
    }
    .menu {
      background-color: #2e2e2e;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0px 0px 10px #494949;
      margin: 20px auto;
      max-width: 600px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: white;
      color: black;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    .location {
      font-size: 12px;
      color: gray;
    }
    .highlight {
      background-color: #fffacd;
    }
  </style>
</head>
<body>
  <div class="menu">
    <h2>📌 개인 시간표 📌</h2>
    <table>
      <thead>
        <tr>
          <th>교시</th>
          <th>월</th>
          <th>화</th>
          <th>수</th>

          <th>금</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1교시</td>
          <td class="highlight">생활과윤리<br><span class="location">3-5</span></td>

          <td>독서A</td>

        <tr>

          <td>영독A</td>
          <td class="highlight">미술창작<br><span class="location">미술2실</span></td>
          <td>영독A</td>
          <td class="highlight">사문탐<br><span class="location">공용1실</span></td>
        </tr>
        <tr>
          <td>3교시</td>
          <td class="highlight">철학<br><span class="location">3-4</span></td>
          <td class="highlight">생활과윤리<br><span class="location">3-5</span></td>
          <td>화작</td>
          <td class="highlight">사회·문화<br><span class="location">3-1</span></td>
          <td>독서A</td>
        </tr>
        <tr>
          <td>4교시</td>
          <td class="highlight">사회·문화<br><span class="location">3-1</span></td>
          <td>화작</td>
          <td>영독B</td>
          <td class="highlight">생활과윤리<br><span class="location">3-5</span></td>
          <td class="highlight">철학<br><span class="location">3-4</span></td>
        </tr>
        <tr>
          <td>5교시</td>
          <td>확통<br><span class="location">공용7실</span></td>
          <td>운건</td>
          <td>창체</td>
          <td>확통<br><span class="location">공용7실</span></td>
          <td class="highlight">미술창작<br><span class="location">미술2실</span></td>
        </tr>
        <tr>
          <td>6교시</td>
          <td class="highlight">미술창작<br><span class="location">미술2실</span></td>
          <td class="highlight">사문탐<br><span class="location">공용1실</span></td>
          <td>창체</td>
          <td>진설<br><span class="location">컴퓨터실</span></td>
          <td>확통<br><span class="location">공용7실</span></td>
        </tr>
        <tr>
          <td>7교시</td>

          <td>독서B</td>
          <td></td>
          <td class="highlight">사문탐<br><span class="location">공용1실</span></td>
          <td></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
