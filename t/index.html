<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>개인 시간표</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-JDJ8Q2F742"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-JDJ8Q2F742');
</script>

<style>
@font-face {
    font-family: 'GmarketSansMedium';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:'GmarketSansMedium', sans-serif;
}

/* 제목 */

header{
    text-align:center;
    padding:60px 20px 40px;
}

header h1{
    margin:0;
    font-size:2rem;
}

header p{
    color:#bfbfbf;
    font-size:14px;
    margin-top:10px;
}

/* 컨테이너 */

.container{
    width:90%;
    max-width:700px;
    margin:0 auto 60px;
}

/* 카드 */

.card{
    background:#2e2e2e;

    border-radius:12px;

    padding:24px 20px;

    box-shadow:0 0 10px #494949;

    text-align:center;

    transition:all .18s ease;
}

.card h2{
    font-size:1.2rem;
    margin-bottom:10px;
}

.card p{
    color:#d6d6d6;
    font-size:14px;
    line-height:1.8;
    margin-bottom:18px;
}

/* 번호 선택 */

select{
    width:100%;
    max-width:250px;

    padding:10px 14px;

    border:none;

    border-radius:6px;

    background:#d1d1d1;

    color:black;

    font-size:14px;

    font-family:inherit;

    cursor:pointer;

    outline:none;
}

/* 뒤로가기 */

.back{
    display:block;

    width:fit-content;

    margin:40px auto 0;

    text-decoration:none;

    color:#cfcfcf;

    font-size:14px;

    transition:.15s;
}

.back:hover{
    color:white;
}

/* 푸터 */

footer{
    text-align:center;

    padding:30px;

    color:#9a9a9a;

    font-size:13px;
}
</style>

<script>
function navigateToTimetable() {
    const num =
      document.getElementById("studentNumber").value;

    if(num){
        window.location.href =
        `/t/num/${num}/`;
    }
}
</script>
</head>

<body>

<header>
    <h1>🕒 개인 시간표</h1>
    <p>자신의 번호를 선택해주세요.</p>
</header>

<div class="container">

    <div class="card">

        <h2>번호 선택</h2>

        <p>
            번호 선택 후 즐겨찾기에 등록하면<br>
            더 편하게 시간표를 확인할 수 있습니다.
        </p>

        <select
            id="studentNumber"
            onchange="navigateToTimetable()">

            <option value="">
                번호 선택
            </option>

            <option value="1">1번</option>
            <option value="2">2번</option>
            <option value="3">3번</option>
            <option value="4">4번</option>
            <option value="5">5번</option>
            <option value="6">6번</option>
            <option value="7">7번</option>
            <option value="8">8번</option>
            <option value="9">9번</option>
            <option value="10">10번</option>
            <option value="11">11번</option>
            <option value="12">12번</option>
            <option value="13">13번</option>
            <option value="14">14번</option>
            <option value="15">15번</option>
            <option value="16">16번</option>
            <option value="17">17번</option>
            <option value="18">18번</option>
            <option value="19">19번</option>
            <option value="20">20번</option>
            <option value="21">21번</option>
            <option value="22">22번</option>
            <option value="23">23번</option>
            <option value="24">24번</option>
            <option value="25">25번</option>
            <option value="26">26번</option>
            <option value="27">27번</option>
            <option value="28">28번</option>
            <option value="29">29번</option>
            <option value="30">30번</option>
            <option value="31">31번</option>

        </select>

    </div>

    <a class="back" href="/">
        ← 메인으로 돌아가기
    </a>

</div>

</body>
<footer>
    © 경인고 6반 사이트
</footer>
</html>
