  <style>
    @font-face {
      font-family: 'GmarketSansMedium';

    .sub-note {

    html {
      color: white;

    body {
      margin: 0;
      font-family: "GmarketSansMedium", cursive;
      background-color: #1a1a1a;

    h1 {
      font-size: 2em;
      text-align: center;
      margin: 0;

    .sub {
      text-align: center;
      color: #cfcfcf;
      margin-top: 10px;
      margin-bottom: 40px;
      font-size: 15px;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto 60px auto;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .menu-card {
      position: relative;
      background-color: #2e2e2e;
      border-radius: 10px;
      padding: 24px 20px 24px 20px;
      text-decoration: none;
      color: white;
      display: block;
      overflow: hidden;

      box-shadow: 0px 0px 10px #494949;

      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .menu-card::before {
      content: "";
      position: absolute;
      inset: -12px;
      background: rgba(255, 255, 255, 0.08);
      filter: blur(20px);
      z-index: -1;
      border-radius: 18px;
      opacity: 0.65;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0px 0px 18px #6a6a6a;
    }

    .menu-title {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    .menu-desc {
      color: #d6d6d6;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .go-btn {
      display: inline-block;
      background-color: #d1d1d1;
      border: none;
      color: black;
      padding: 10px 14px;
      text-align: center;
      font-size: 15px;
      margin-top: 4px;
      font-family: "GmarketSansMedium", cursive;
      border-radius: 5px;
    }

    .back {
      display: block;
      width: fit-content;
      margin: 36px auto 0 auto;
      color: #d8d8d8;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: white;
    }
  </style>
