<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">

<title>필기 공유</title>

<style>
@font-face {
    font-family: 'GmarketSansMedium';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #1a1a1a;
    color: white;
    font-family: "GmarketSansMedium", sans-serif;
}

h1 {
    text-align: center;
    margin: 0;
    padding-top: 60px;
    font-size: 2rem;
}

/* 공지 */

.notice-box {
    width: 90%;
    max-width: 700px;

    margin: 25px auto 50px;
    padding: 22px 28px;

    background: linear-gradient(
        135deg,
        #2d2d2d,
        #383838
    );

    border-radius: 14px;

    box-shadow:
        0 0 18px rgba(255,255,255,0.05),
        0 0 40px rgba(255,255,255,0.03);
}

.notice-title {
    font-size: 1.1rem;
    margin-bottom: 14px;
    font-weight: bold;
}

.notice-box ul {
    margin: 0;
    padding-left: 20px;
}

.notice-box li {
    color: #d8d8d8;
    line-height: 1.9;
    font-size: 14px;
}

/* 컨텐츠 */

.container {
    width: 90%;
    max-width: 1000px;
    margin: 0 auto 60px;
}

/* 과목 2개 전용 */

.menu-grid {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
}

.menu-card {
    width: 260px;

    position: relative;
    overflow: hidden;

    text-decoration: none;
    color: white;

    background: #2e2e2e;

    border-radius: 12px;

    padding: 24px 20px;

    box-shadow: 0 0 10px #494949;

    transition: all 0.18s ease;
}

.menu-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 18px #6a6a6a;
}

.menu-title {
    font-size: 1.2rem;
    margin-bottom: 10px;
}

.menu-desc {
    color: #d6d6d6;
    font-size: 14px;
    margin-bottom: 18px;
}

.go-btn {
    display: inline-block;

    background: #d1d1d1;
    color: black;

    padding: 10px 14px;

    border-radius: 6px;

    font-size: 14px;
}

/* 메인 버튼 */

.back {
    display: block;

    width: fit-content;

    margin: 40px auto 0;

    text-decoration: none;

    color: #cfcfcf;

    font-size: 14px;

    transition: 0.15s;
}

.back:hover {
    color: white;
}
</style>
</head>

<body>

<h1>📌 필기 공유 📌</h1>

<div class="notice-box">
    <div class="notice-title">
        📢 공지사항 
    </div>

    <ul>
        <li>영독작 및 확통은 페이지 조회수가 없어 비용 절감을 위해 삭제합니다.</li>
        <li>화법과 작문은 갈래복합만 업로드되며, 독서는 문학만 업로드됩니다.</li>
        <li>이외의 학습지가 필요하신 경우 개인적으로 요청 부탁드립니다.</li>
    </ul>
</div>

<div class="container">

    <div class="menu-grid">

        <a class="menu-card" href="./dok1/">
            <div class="menu-title">문학(독서)</div>
            <div class="menu-desc">학습지 사진 보기</div>
            <div class="go-btn">바로가기</div>
        </a>

        <a class="menu-card" href="./hw/">
            <div class="menu-title">화법과 작문</div>
            <div class="menu-desc">학습지 사진 보기</div>
            <div class="go-btn">바로가기</div>
        </a>

    </div>

    <a class="back" href="/">
        ← 메인으로 돌아가기
    </a>

</div>

</body>
</html>
